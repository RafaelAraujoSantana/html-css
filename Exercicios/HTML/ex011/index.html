<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medias com HTML5</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir esse site em vários dispositicos diferentes ou simplismente aumente e diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/Foto-p.png" type="image/png">
        <source media="(max-width: 1000px)" srcset="imagens/Foto-M.png" type="image/png">
        <img src="imagens/Foto-G.png" alt="Imagem Flexível">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos Aprender a reproduzir áudios em HTML5.</p>
    <audio preload="metadata"  controls> 
        <source src="midia/guanacast33.mp3" type="audio/mpeg
        ">
        <source src="midia/guanacast33.ogg" type="audio/ogg
        ">
        <source src="midia/guanacast33.wav" type="audio/wav
        ">
        <p>Infelizmente seu navegador não consegue reproduzir áudio. <a href="midia/guanacast33.mp3">Clique aqui para baixar o arquivo em MP3</a></p>
    </audio>
   
</body>
</html>
