<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 02 Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            font-weight: bold;
            padding: 10px;
            text-align: center;
        }

        .titulo {
            background-color: grey;
            color: white;
        }

    </style>
</head>
<body>
    <h1>Desafio dos exercícios de tabela do CursoEmVideo</h1>
    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="rowgroup" class="titulo">Área</th>
                <th rowspan="2" scope="rowgroup" class="titulo">Disciplinas</th>
                <th colspan="2" scope="colgroup" class="titulo">Notas</th>
                <th rowspan="2" scope="rowgroup" class="titulo">Média</th>
            </tr>
            <tr>
                <th class="titulo">Nota 1</th>
                <th class="titulo">nota 2</th>
            </tr>
            <tr>
                <th rowspan="4" scope="rowgroup">Exatas</th>
                <td>Matemática</td>
                <td>5.0</td>
                <td>8.0</td>
                <td>6.5</td>
            </tr>
            <tr>
                <td>Física</td>
                <td>8.0</td>
                <td>8.0</td>
                <td>8.0</td>
            </tr>
            <tr>
                <td>Química</td>
                <td>5.6</td>
                <td>7.9</td>
                <td>6.8</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td>10.0</td>
                <td>9.0</td>
                <td>9.5</td>
            </tr>
            <tr>
                <th colspan="4" scope="colgroup" class="titulo">Média de Exatas</th>
                <td class="titulo">7.5</td>
            </tr>
            <tr>
                <th rowspan="2" scope="rowgroup">Humanas</th>
                <td>História</td>
                <td>7.8</td>
                <td>8.5</td>
                <td>7.4</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>9.0</td>
                <td>9.0</td>
                <td>9.0</td>
            </tr>
            <tr>
                <th colspan="4" scope="colgroup" class="titulo">Média de Humanas</th>
                <td class="titulo">8.2</td>
            </tr>
        </thead>
    </table>
</body>
</html>
